<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'DM Sans',sans-serif;background:#0a0a0f;color:#e8e6f0;min-height:100vh;overflow-x:hidden}
:root{
  --gold:#c9a84c;--gold-light:#e8c97a;--gold-dim:#7a5f28;
  --surface:#13121a;--surface2:#1c1b26;--surface3:#252434;
  --border:#2e2c40;--border-light:#3d3b54;
  --text:#e8e6f0;--text-muted:#8b89a0;--text-dim:#5a5870;
  --green:#4ade80;--red:#f87171;--blue:#60a5fa;
}
.app{max-width:900px;margin:0 auto;padding:2rem 1rem}

/* Header */
.header{text-align:center;margin-bottom:3rem}
.logo{font-family:'DM Serif Display',serif;font-size:2.8rem;background:linear-gradient(135deg,var(--gold),var(--gold-light));-webkit-background-clip:text;-webkit-text-fill-color:transparent;letter-spacing:-0.5px}
.logo-sub{font-size:0.85rem;color:var(--text-muted);letter-spacing:3px;text-transform:uppercase;margin-top:0.25rem}


/* Steps */
.steps{display:flex;align-items:center;justify-content:center;gap:0;margin-bottom:2.5rem}
.step{display:flex;align-items:center;gap:8px;padding:8px 16px;border-radius:30px;font-size:13px;color:var(--text-dim);transition:all 0.3s}
.step.active{background:var(--surface2);border:1px solid var(--border-light);color:var(--gold)}
.step.done{color:var(--green)}
.step-num{width:22px;height:22px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:600;background:var(--surface3);color:var(--text-dim)}
.step.active .step-num{background:var(--gold);color:#000}
.step.done .step-num{background:var(--green);color:#000}
.step-divider{width:32px;height:1px;background:var(--border)}

/* Cards */
.card{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:2rem;margin-bottom:1.5rem}
.card-title{font-family:'DM Serif Display',serif;font-size:1.4rem;color:var(--text);margin-bottom:0.5rem}
.card-sub{font-size:14px;color:var(--text-muted);margin-bottom:1.5rem}

/* Upload zone */
.upload-zone{border:2px dashed var(--border-light);border-radius:12px;padding:3rem 2rem;text-align:center;cursor:pointer;transition:all 0.3s;position:relative}
.upload-zone:hover,.upload-zone.drag{border-color:var(--gold);background:rgba(201,168,76,0.05)}
.upload-zone input{position:absolute;inset:0;opacity:0;cursor:pointer}
.upload-icon{font-size:2.5rem;color:var(--text-dim);margin-bottom:0.75rem}
.upload-title{font-weight:500;font-size:1rem;color:var(--text);margin-bottom:0.25rem}
.upload-hint{font-size:13px;color:var(--text-muted)}
.file-ready{display:flex;align-items:center;gap:12px;background:var(--surface2);border:1px solid var(--border-light);border-radius:10px;padding:1rem 1.25rem;margin-top:1rem}
.file-icon{font-size:1.5rem;color:var(--gold)}
.file-name{font-size:14px;font-weight:500}
.file-size{font-size:12px;color:var(--text-muted)}

/* Form */
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:1rem}
.form-group{display:flex;flex-direction:column;gap:6px}
.form-group.full{grid-column:1/-1}
label{font-size:13px;color:var(--text-muted);font-weight:500}
input,select,textarea{background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:10px 14px;font-size:14px;color:var(--text);font-family:'DM Sans',sans-serif;outline:none;transition:border 0.2s;width:100%}
input:focus,select:focus,textarea:focus{border-color:var(--gold)}
select option{background:#1c1b26}
.checkbox-group{display:flex;flex-wrap:wrap;gap:8px}
.chip{display:flex;align-items:center;gap:6px;background:var(--surface2);border:1px solid var(--border);border-radius:20px;padding:6px 14px;font-size:13px;cursor:pointer;transition:all 0.2s;user-select:none}
.chip:hover{border-color:var(--border-light)}
.chip.selected{background:rgba(201,168,76,0.12);border-color:var(--gold);color:var(--gold)}
.chip input{display:none}

/* Buttons */
.btn{display:inline-flex;align-items:center;gap:8px;padding:11px 24px;border-radius:10px;font-size:14px;font-weight:500;cursor:pointer;transition:all 0.2s;border:none;font-family:'DM Sans',sans-serif}
.btn-primary{background:var(--gold);color:#000}
.btn-primary:hover{background:var(--gold-light)}
.btn-primary:disabled{opacity:0.4;cursor:not-allowed}
.btn-ghost{background:transparent;border:1px solid var(--border);color:var(--text-muted)}
.btn-ghost:hover{border-color:var(--border-light);color:var(--text)}
.btn-danger{background:transparent;border:1px solid var(--red);color:var(--red)}
.btn-success{background:rgba(74,222,128,0.12);border:1px solid var(--green);color:var(--green)}
.btns{display:flex;gap:10px;justify-content:flex-end;margin-top:1.5rem}

/* Jobs */
.job-card{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:1.5rem;margin-bottom:1rem;cursor:pointer;transition:all 0.25s;position:relative}
.job-card:hover{border-color:var(--border-light);transform:translateY(-1px)}
.job-card.selected{border-color:var(--gold);background:rgba(201,168,76,0.04)}
.job-header{display:flex;align-items:flex-start;justify-content:space-between;gap:1rem;margin-bottom:0.75rem}
.job-title{font-weight:600;font-size:1rem;color:var(--text)}
.job-company{font-size:13px;color:var(--text-muted);margin-top:2px}
.match-badge{display:flex;align-items:center;gap:5px;background:rgba(74,222,128,0.1);border:1px solid rgba(74,222,128,0.3);border-radius:20px;padding:4px 12px;font-size:12px;color:var(--green);white-space:nowrap;flex-shrink:0}
.job-tags{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:0.75rem}
.tag{background:var(--surface2);border:1px solid var(--border);border-radius:20px;padding:3px 10px;font-size:12px;color:var(--text-muted)}
.tag.highlight{border-color:var(--gold-dim);color:var(--gold)}
.job-desc{font-size:13px;color:var(--text-muted);line-height:1.6}
.job-select-btn{position:absolute;bottom:1.25rem;right:1.25rem}

/* Suggestions */
.suggestion{background:var(--surface2);border:1px solid var(--border);border-radius:12px;padding:1.25rem;margin-bottom:0.75rem;transition:all 0.2s}
.suggestion.approved{border-color:rgba(74,222,128,0.4);background:rgba(74,222,128,0.04)}
.suggestion.rejected{border-color:rgba(248,113,113,0.3);opacity:0.5}
.suggestion-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:0.75rem}
.suggestion-label{font-size:12px;color:var(--text-muted);text-transform:uppercase;letter-spacing:1px}
.suggestion-actions{display:flex;gap:8px}
.sug-btn{display:inline-flex;align-items:center;gap:5px;padding:5px 12px;border-radius:8px;font-size:12px;cursor:pointer;font-family:'DM Sans',sans-serif;font-weight:500;transition:all 0.2s;border:1px solid}
.sug-approve{background:rgba(74,222,128,0.1);border-color:rgba(74,222,128,0.4);color:var(--green)}
.sug-approve:hover{background:rgba(74,222,128,0.2)}
.sug-reject{background:transparent;border-color:rgba(248,113,113,0.4);color:var(--red)}
.sug-reject:hover{background:rgba(248,113,113,0.1)}
.diff-old{background:rgba(248,113,113,0.1);border-radius:6px;padding:8px 12px;font-size:13px;color:var(--text-muted);margin-bottom:8px;text-decoration:line-through;line-height:1.6}
.diff-old::before{content:"Before  ";font-size:11px;font-weight:600;color:var(--red);text-decoration:none;display:block;margin-bottom:4px}
.diff-new{background:rgba(74,222,128,0.06);border-radius:6px;padding:8px 12px;font-size:13px;color:var(--text);line-height:1.6}
.diff-new::before{content:"After  ";font-size:11px;font-weight:600;color:var(--green);display:block;margin-bottom:4px}

/* Resume preview */
.resume-preview{background:#fff;color:#1a1a1a;border:1px solid #d0cfe0;border-radius:3px;overflow:hidden;max-height:760px;overflow-y:auto;box-shadow:0 4px 28px rgba(0,0,0,0.55);padding:0.55in 0.65in}
.tpl-grid{display:grid;grid-template-columns:1fr 1fr;gap:1rem;margin-bottom:1.5rem}
.tpl-card{background:var(--surface2);border:2px solid var(--border);border-radius:12px;padding:0;cursor:pointer;transition:all 0.2s;overflow:hidden;position:relative}
.tpl-card:hover{border-color:var(--border-light);transform:translateY(-2px)}
.tpl-card.selected{border-color:var(--gold);box-shadow:0 0 0 1px var(--gold)}
.tpl-card.selected::after{content:"✓";position:absolute;top:8px;right:10px;background:var(--gold);color:#000;width:20px;height:20px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;line-height:20px;text-align:center}
.tpl-preview{background:#fff;padding:14px 16px;min-height:160px;pointer-events:none;transform-origin:top left;font-size:7pt;line-height:1.35;overflow:hidden;height:160px}
.tpl-label{padding:8px 12px;background:var(--surface3);border-top:1px solid var(--border)}
.tpl-name{font-size:13px;font-weight:600;color:var(--text)}
.tpl-desc{font-size:11px;color:var(--text-muted);margin-top:1px}

/* Loading */
.loading{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:4rem 2rem;gap:1rem}
.spinner{width:36px;height:36px;border:2px solid var(--border);border-top-color:var(--gold);border-radius:50%;animation:spin 0.8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.loading-text{color:var(--text-muted);font-size:14px}



/* Progress bar */
.progress-bar{width:100%;height:3px;background:var(--border);border-radius:3px;margin-bottom:2rem;overflow:hidden}
.progress-fill{height:100%;background:var(--gold);border-radius:3px;transition:width 0.5s ease}

/* Alerts */
.alert{padding:12px 16px;border-radius:10px;font-size:13px;margin-bottom:1rem;display:flex;align-items:flex-start;gap:10px}
.alert-info{background:rgba(96,165,250,0.1);border:1px solid rgba(96,165,250,0.3);color:var(--blue)}
.alert-success{background:rgba(74,222,128,0.1);border:1px solid rgba(74,222,128,0.3);color:var(--green)}

/* Final resume */
.apply-cta{background:linear-gradient(135deg,rgba(201,168,76,0.12),rgba(201,168,76,0.04));border:1px solid var(--gold-dim);border-radius:14px;padding:1.5rem;text-align:center;margin-top:1.5rem}
.apply-cta h3{font-family:'DM Serif Display',serif;font-size:1.3rem;margin-bottom:0.5rem}
.apply-cta p{color:var(--text-muted);font-size:13px;margin-bottom:1rem}
</style>

  <div class="steps" id="stepsNav">

    <div class="step-divider"></div>

<div style="text-align:center;padding:1.5rem 1rem 2rem;font-size:11px;color:#5a5870;border-top:1px solid #2e2c40;margin-top:1rem">
  © 2026 ResumeMatch · Built by Ritesh Penumatsa · All rights reserved
  <span style="margin:0 6px">·</span>AI-powered resume tailoring
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
<script>
if(typeof pdfjsLib!=="undefined") pdfjsLib.GlobalWorkerOptions.workerSrc="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js";
</script>

<script>
const API_URL = "https://api.anthropic.com/v1/messages";
const MODEL = "claude-sonnet-4-20250514";

let state = {
  step: 1,
  resumeText: "",
  resumeFile: null,
  resumeBase64: null,
  resumeMediaType: null,
  parsedResume: null,
  prefs: { location:"", occupation:"", targetCompany:"", jobDescription:"", industry:"", jobTypes:[], experience:"", skills:"" },
  jobs: [],
  selectedJob: null,
  suggestions: [],
  finalResume: "",
  finalResumeData: null,
  finalResumeHTML: null,
  finalCoverLetter: "",
  coverLetterTone: "professional",
  selectedTemplate: "classic",
  atsScore: null,
};

// ── Local resume parser — works without AI ──
function localParseResume(text){
  const lines = text.split("\n").map(l=>l.trim()).filter(Boolean);
  const name = lines[0]||"";
  const contactLine = lines.find(l=>l.includes("@")||l.includes("|"))||"";
  const email = (contactLine.match(/[\w.+-]+@[\w.]+/)||[])[0]||"";
  const phone = (contactLine.match(/[\d()\s.+-]{10,}/)||[])[0]?.trim()||"";

  // Summary: lines after "summary" header
  let summary="";
  const sumIdx = lines.findIndex(l=>/professional summary|summary|objective/i.test(l));
  if(sumIdx>=0){
    const sumLines=[];
    for(let i=sumIdx+1;i<Math.min(sumIdx+5,lines.length);i++){
      if(/^(education|experience|skills|projects|certif)/i.test(lines[i])) break;
      sumLines.push(lines[i]);
    }
    summary=sumLines.join(" ").trim();
  }

  // Skills: look for bullet lines with commas
  const skillLine = lines.find(l=>l.startsWith("•")&&l.includes(",")&&l.length>30)||"";
  const topSkills = skillLine
    ? skillLine.replace(/^[•\-]\s*/,"").split(/[,|]/).map(s=>s.trim()).filter(Boolean).slice(0,10)
    : [];

  // Education
  const eduLine = lines.find(l=>/university|college|bachelor|master|b\.s\.|m\.s\./i.test(l))||"";

  // Recent jobs: "Company | Title" or "Title at Company"
  const recentJobs=[];
  lines.forEach(l=>{
    if(l.includes("|")&&!l.includes("@")&&!l.includes("github")&&recentJobs.length<3){
      const p=l.split("|").map(s=>s.trim());
      if(p.length>=2) recentJobs.push(`${p[1]} at ${p[0]}`);
    }
  });

  // Current title — look for title near top or in experience
  const titleLine = lines.slice(1,5).find(l=>
    /engineer|analyst|scientist|developer|manager|designer|consultant|intern/i.test(l)&&l.length<60
  )||"";

  return {
    name, email, phone,
    currentTitle: titleLine||"Professional",
    yearsExperience: 2,
    topSkills: topSkills.length ? topSkills : ["Communication","Problem Solving","Analysis","Python","SQL"],
    summary: summary||"Experienced professional with strong analytical and technical skills.",
    education: eduLine||"",
    recentJobs
  };
}

// Application tracker — persisted to localStorage
function loadApplications(){ try{ return JSON.parse(localStorage.getItem("rm_applications")||"[]"); }catch(e){ return []; } }
function saveApplications(apps){ try{ localStorage.setItem("rm_applications",JSON.stringify(apps)); }catch(e){} }

function setStep(n){
  state.step=n;
  const stepMap={1:"step-tab-1",2:"step-tab-2",4:"step-tab-4","t5":"step-tab-45",5:"step-tab-5"};
  const order=[1,2,4,"t5",5];
  const ni=order.indexOf(n);
  order.forEach((s,i)=>{
    const el=document.getElementById(stepMap[s]);
    if(!el) return;
    el.className="step"+(i<ni?" done":(i===ni?" active":""));
  });
  const pf=document.getElementById("progressFill"); if(pf) pf.style.width=(ni<0?0:Math.round((ni/(order.length-1))*100))+"%";
  render();
}

function render(){
  const c = document.getElementById("mainContent");
  if(state.step===1) renderUpload(c);
  else if(state.step===2) renderPrefs(c);
  else if(state.step===4) renderSuggestions(c);
  else if(state.step==="t5") renderTemplatePicker(c);
  else if(state.step===5){ renderApply(c); runATSCheck(); }
}

/* ── STEP 1: Upload ── */
function renderUpload(c){
  c.innerHTML=`
    <div class="card">
      <div class="card-title">Upload your resume</div>
      <div class="card-sub">Upload a PDF or paste your resume text below. AI will extract your skills and experience automatically.</div>
      <div class="upload-zone" id="uploadZone">
        <input type="file" id="fileInput" accept=".pdf,.txt,.doc,.docx" />
        <div class="upload-icon"><i class="ti ti-file-upload" aria-hidden="true"></i></div>
        <div class="upload-title">Drag & drop your resume here</div>
        <div class="upload-hint">PDF, TXT, or DOC • Max 5MB</div>
      </div>
      <div style="margin-top:1rem">
        <div style="display:flex;align-items:center;gap:10px;margin-bottom:0.75rem">
          <div style="flex:1;height:1px;background:var(--border)"></div>
          <span style="font-size:12px;color:var(--text-dim);white-space:nowrap">or paste resume text directly</span>
          <div style="flex:1;height:1px;background:var(--border)"></div>
        </div>
        <textarea id="pasteResume" rows="6" placeholder="Paste your resume text here..." style="width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:10px 14px;font-size:13px;color:var(--text);font-family:'DM Sans',sans-serif;outline:none;resize:vertical;line-height:1.5" oninput="if(this.value.trim()){document.getElementById('nextBtn').disabled=false}">${state.resumeText||""}</textarea>
      </div>
      <div id="fileInfo"></div>
      <div class="btns">
        <button class="btn btn-primary" id="nextBtn" ${state.resumeText?"":"disabled"} onclick="handlePasteAndParse()">
          <i class="ti ti-sparkles" aria-hidden="true"></i> Parse with AI
        </button>
      </div>
    </div>`;
  const fi = document.getElementById("fileInput");
  fi.addEventListener("change",e=>{ if(e.target.files[0]) handleFile(e.target.files[0]); });
  const zone = document.getElementById("uploadZone");
  zone.addEventListener("dragover",e=>{e.preventDefault();zone.classList.add("drag")});
  zone.addEventListener("dragleave",()=>zone.classList.remove("drag"));
  zone.addEventListener("drop",e=>{e.preventDefault();zone.classList.remove("drag");if(e.dataTransfer.files[0])handleFile(e.dataTransfer.files[0]);});
}

function handlePasteAndParse(){
  const pasted = document.getElementById("pasteResume")?.value?.trim()||"";
  if(pasted && !state.resumeText) state.resumeText = pasted;
  if(!state.resumeFile && !state.resumeText && pasted) state.resumeText = pasted;
  if(pasted) state.resumeText = pasted; // always prefer fresh paste
  parseResume();
}

function handleFile(file){
  state.resumeFile=file;
  state.resumeText="";
  state.resumeBase64=null;
  const info=document.getElementById("fileInfo");
  info.innerHTML=`<div class="file-ready">
    <div class="file-icon"><i class="ti ti-file-text" aria-hidden="true"></i></div>
    <div><div class="file-name">${file.name}</div><div class="file-size">${(file.size/1024).toFixed(1)} KB</div></div>
    <i class="ti ti-circle-check" style="margin-left:auto;color:var(--green);font-size:1.25rem" aria-hidden="true"></i>
  </div>`;
  document.getElementById("nextBtn").disabled=false;

  const ext = file.name.split(".").pop().toLowerCase();

  if(ext==="pdf"){
    const reader = new FileReader();
    reader.onload = async (e) => {
      try{
        const arrayBuffer = e.target.result;
        // Store base64 for Claude (used in buildFinalResume for accurate rendering)
        const uint8 = new Uint8Array(arrayBuffer);
        let binary = "";
        uint8.forEach(b => binary += String.fromCharCode(b));
        state.resumeBase64 = btoa(binary);
        state.resumeMediaType = "application/pdf";

        // Extract text with position-aware spacing using PDF.js
        const typedArray = new Uint8Array(arrayBuffer);
        const pdf = await pdfjsLib.getDocument({data: typedArray}).promise;
        let fullText = "";
        for(let i=1; i<=pdf.numPages; i++){
          const page = await pdf.getPage(i);
          const content = await page.getTextContent();
          const items = content.items;
          let lineText = "";
          let lastY = null;
          let lastX = null;
          for(const item of items){
            const str = item.str;
            if(!str) continue;
            const x = item.transform[4];
            const y = item.transform[5];
            if(lastY !== null && Math.abs(y - lastY) > 2){
              // New line
              fullText += lineText.trimEnd() + "\n";
              lineText = str;
            } else {
              // Same line — add space only if there's a real gap between items
              if(lastX !== null && x > lastX + 1 && lineText && !lineText.endsWith(" ")){
                lineText += " " + str;
              } else {
                lineText += str;
              }
            }
            lastY = y;
            lastX = x + (item.width||0);
          }
          if(lineText) fullText += lineText.trimEnd() + "\n";
          fullText += "\n";
        }
        state.resumeText = fullText.trim();
      }catch(err){
        console.error("PDF.js extraction failed:", err);
      }
    };
    reader.readAsArrayBuffer(file);
  } else {
    // Plain text
    const reader = new FileReader();
    reader.onload = e => { state.resumeText = e.target.result; };
    reader.readAsText(file);
  }
}

async function parseResume(){
  const c=document.getElementById("mainContent");
  c.innerHTML=`<div class="loading"><div class="spinner"></div><div class="loading-text">AI is reading your resume...</div></div>`;

  // If PDF.js extracted text, it's already in state.resumeText
  // If it fell back to base64, do a Claude extraction first
  if(!state.resumeText && state.resumeBase64){
    try{
      const extractResp = await fetch(API_URL,{
        method:"POST", headers:{"Content-Type":"application/json","anthropic-dangerous-direct-browser-access":"true"},
        body:JSON.stringify({ model:MODEL, max_tokens:3000,
          messages:[{role:"user", content:[
            {type:"document", source:{type:"base64", media_type:"application/pdf", data:state.resumeBase64}},
            {type:"text", text:"Return only the complete resume text, exactly as written. No commentary."}
          ]}]
        })
      });
      const d = await extractResp.json();
      state.resumeText = d.content.map(i=>i.text||"").join("").trim();
    }catch(e){ console.error("Extraction fallback failed",e); }
  }

  const resumeForParsing = state.resumeText || "No resume text available.";

  try{
    const resp = await fetch(API_URL,{
      method:"POST", headers:{"Content-Type":"application/json","anthropic-dangerous-direct-browser-access":"true"},
      body:JSON.stringify({ model:MODEL, max_tokens:1200,
        messages:[{role:"user", content:`Extract information from this resume and return a JSON object with these exact keys filled with real values from the resume:
{"name":"John Smith","email":"john@email.com","phone":"555-1234","currentTitle":"Software Engineer","yearsExperience":3,"topSkills":["Python","SQL","React"],"summary":"Two sentence summary here.","education":"B.S. Computer Science, UT Austin","recentJobs":["Software Engineer at Acme Corp","Junior Dev at StartupCo"], "linkedin": "full url", "github": "full url", "portfolio": "full url"}

RESUME:
${resumeForParsing}

Return ONLY the JSON. No markdown, no backticks, no explanation.`}]
      })
    });
    const data = await resp.json();
    if(data.error) throw new Error(data.error.message);
    const txt = data.content.map(i=>i.text||"").join("");
    const m = txt.replace(/```json|```/g,"").trim().match(/\{[\s\S]*\}/);
    if(!m) throw new Error("No JSON in response");
    const parsed = JSON.parse(m[0]);
    if(!parsed.name && !parsed.summary) throw new Error("Empty result");
    state.parsedResume = parsed;
  }catch(e){
    console.warn("AI parse failed, using local parser:", e.message);
    state.parsedResume = localParseResume(state.resumeText||"");
  }
  setStep(2);
}

// Pure local ATS-style scoring — no API needed
function scoreJobMatch(job){
  const userSkills = (state.prefs.skills||"").toLowerCase().split(/[,\s]+/).filter(s=>s.length>2);
  const userOcc    = (state.prefs.occupation||"").toLowerCase();
  const jobText    = (job.title+" "+(job.description||"")+" "+(job.keyRequirements||[]).join(" ")).toLowerCase();
  let score = 50;
  // Title match
  if(jobText.includes(userOcc) || userOcc.split(" ").some(w=>w.length>3&&jobText.includes(w))) score+=20;
  // Skill hits
  const hits = userSkills.filter(s=>jobText.includes(s)).length;
  score += Math.min(25, Math.round((hits/Math.max(userSkills.length,1))*25));
  // Experience level
  const exp = (state.prefs.experience||"").toLowerCase();
  if(exp&&jobText.includes(exp.split(" ")[0])) score+=5;
  return Math.min(99, score);
}

function trackApplication(jobIdx){
  const job = state.jobs[jobIdx];
  if(!job) return;
  const apps = loadApplications();
  const exists = apps.find(a=>a.company===job.company&&a.title===job.title);
  if(!exists){
    apps.unshift({
      id: Date.now(),
      title: job.title,
      company: job.company,
      location: job.location||"",
      applyUrl: job.applyUrl||"#",
      source: job.source||"",
      isEasyApply: job.isEasyApply||false,
      appliedAt: new Date().toLocaleDateString(),
      status: "Applied"
    });
    saveApplications(apps);
  }
}

Return ONLY a JSON array, no markdown, no backticks:

  try{

      body:JSON.stringify({model:MODEL,max_tokens:1500,messages:[{role:"user",content:prompt}]})

function getMockSuggestions(job){
  const p    = state.parsedResume||{};
  const prefs= state.prefs||{};
  const occ  = prefs.occupation||job.title||"Professional";
  const co   = prefs.targetCompany||job.company||"this company";
  const yrs  = p.yearsExperience||3;
  const req0 = (job.keyRequirements||[])[0]||prefs.skills.split(",")[0]||"core skills";
  const req1 = (job.keyRequirements||[])[1]||prefs.skills.split(",")[1]||"collaboration";
  const req2 = (job.keyRequirements||[])[2]||"data analysis";
  const skills = (p.topSkills||[]).join(", ")||prefs.skills||"technical skills";
  return [
    {section:"Professional Summary",
     reason:"Rewrites summary to mirror the job title and top requirements — critical for ATS.",
     oldText:p.summary||`${occ} with ${yrs}+ years of experience.`,
     newText:`${occ} with ${yrs}+ years of experience in ${req0} and ${req1}. Proven track record delivering measurable results, now seeking to contribute to ${co}.`},
    {section:"Skills Section",
     reason:"Adds missing keywords from the job description that ATS systems scan for.",
     oldText:`Skills: ${skills}`,
     newText:`Skills: ${req0}, ${req1}, ${req2}, ${skills.split(",").slice(0,4).join(", ")}`},
    {section:"Experience — Impact Bullet",
     reason:"Adds quantified impact — resumes with metrics are 40% more likely to get interviews.",
     oldText:(p.recentJobs||[])[0]||"Contributed to team projects and deliverables.",
     newText:`Led end-to-end ${req0} initiatives, improving efficiency by 25% and reducing processing time by 2 weeks per cycle.`},
    {section:"Experience — Keywords Bullet",
     reason:"Incorporates job description language directly to pass ATS keyword matching.",
     oldText:"Supported cross-functional team goals and project delivery.",
     newText:`Applied ${req1} and ${req2} across multiple stakeholder projects, delivering actionable insights that supported ${co}-aligned objectives.`},
    {section:"Professional Headline",
     reason:"ATS systems scan the headline — matching the exact job title boosts ranking significantly.",
     oldText:p.currentTitle||occ,
     newText:`${occ} · ${req0} · ${prefs.experience||"Open to opportunities"}`},
  ];
}

      method:"POST",
      headers:{"Content-Type":"application/json","anthropic-dangerous-direct-browser-access":"true"},
      body:JSON.stringify({model:MODEL, max_tokens:4096, messages:[{role:"user",content:messageContent}]})
    });
    const data = await resp.json();

    if(data.error) throw new Error("API: "+( data.error.message||JSON.stringify(data.error)));

    const raw = data.content.map(i=>i.text||"").join("").trim();
    console.log("API response preview:", raw.slice(0,300));

    const stripped   = raw.replace(/^```json\s*/,"").replace(/\s*```\s*$/,"").trim();
    const jsonMatch  = stripped.match(/\{[\s\S]*\}/);
    if(!jsonMatch) throw new Error("No JSON object in response. Got: "+raw.slice(0,150));

    const parsed = JSON.parse(jsonMatch[0]);
    console.log("Parsed keys:", Object.keys(parsed));
    console.log("name=",parsed.name," summary chars=",(parsed.summary||"").length," exp=",(parsed.experience||[]).length);

    if(!parsed.name && !(parsed.summary||"").trim() && !(parsed.experience||[]).length){
      throw new Error("JSON returned but all fields are empty — prompt may have been misunderstood");
    }

    state.finalResumeData = parsed;
    state.finalResumeHTML = null;

  }catch(e){
    console.warn("buildFinalResume failed, using fallback:", e.message);
    // Silently use fallback — user experience uninterrupted
    useFallbackData();
    setStep("t5");
    return;
  }

  setStep("t5");
}

function useFallbackData(){
  // Primary source: parse the full resumeText directly into structured sections
  const raw = state.resumeText || "";
  const fb  = state.parsedResume || {};

  if(!raw && !fb.name){
    state.finalResumeData = null;
    return;
  }

  // If we have good resumeText, parse it into sections using regex
  if(raw.length > 100){
    const lines = raw.split("\n").map(l=>l.trim()).filter(Boolean);

    // Name = first non-empty line
    const name = lines[0] || fb.name || "";

    // Contact = second line (usually "City | phone | email | ...")
    const contact = lines[1] && lines[1].includes("|") ? lines[1] : fb.email||"";

    // Find section boundaries by looking for ALL-CAPS or known section headers
    const SEC_RE = /^(PROFESSIONAL SUMMARY|SUMMARY|EDUCATION|EXPERIENCE|PROJECTS?|ADDITIONAL PROJECTS?|SKILLS?|CERTIFICATIONS?|ADDITIONAL)\s*$/i;
    const sections = {};
    let curSec = "header";
    let curLines = [];

    for(let i=2; i<lines.length; i++){
      const l = lines[i];
      if(SEC_RE.test(l)){
        sections[curSec] = curLines;
        curSec = l.toUpperCase().replace(/\s+/g,"_");
        curLines = [];
      } else {
        curLines.push(l);
      }
    }
    sections[curSec] = curLines;

    // Parse summary
    const summaryLines = sections["PROFESSIONAL_SUMMARY"] || sections["SUMMARY"] || [];
    const summary = summaryLines.join(" ").trim() || fb.summary || "";

    // Parse education — look for university lines + degree lines + bullets
    const eduLines = sections["EDUCATION"] || [];
    const education = [];
    let curEdu = null;
    for(const l of eduLines){
      if(l.match(/university|college|institute|school/i) || l.match(/\d{4}/) && !l.startsWith("•")){
        if(curEdu) education.push(curEdu);
        const dateMatch = l.match(/(Jan|Feb|Mar|Apr|May|Jun|Jul|Aug|Sep|Oct|Nov|Dec)\s+\d{4}|\d{4}/);
        curEdu = {school:l.replace(dateMatch?.[0]||"","").trim(), degree:"", location:"", date:dateMatch?.[0]||"", gpa:"", details:[]};
      } else if(curEdu && l.match(/bachelor|master|certificate|b\.s\.|m\.s\.|phd|associate/i)){
        const parts = l.split(/austin|new york|san francisco|remote|,\s*[A-Z]{2}/i);
        curEdu.degree = parts[0].trim();
        curEdu.location = l.replace(curEdu.degree,"").trim();
      } else if(curEdu && l.startsWith("•")){
        if(l.toLowerCase().includes("gpa")) curEdu.gpa = l.match(/[\d.]+/)?.[0]||"";
        else curEdu.details.push(l.replace(/^•\s*/,""));
      } else if(curEdu){
        if(!curEdu.degree) curEdu.degree = l;
        else curEdu.details.push(l);
      }
    }
    if(curEdu) education.push(curEdu);
    // Fallback education from parsedResume
    if(!education.length && fb.education){
      education.push({school:"",degree:typeof fb.education==="string"?fb.education:"",location:"",date:"",gpa:"",details:[]});
    }

    // Parse experience
    const expLines = sections["EXPERIENCE"] || [];
    const experience = [];
    let curExp = null;
    for(const l of expLines){
      // Company | Title  Date  OR  Company  Date on separate line
      if(l.includes("|") && !l.startsWith("•")){
        if(curExp) experience.push(curExp);
        const dateMatch = l.match(/(Jan|Feb|Mar|Apr|May|Jun|Jul|Aug|Sep|Oct|Nov|Dec)[^|]*\d{4}[^|]*(?:Present|-[^|]*)?\s*$/i);
        const mainPart = l.replace(dateMatch?.[0]||"","").trim();
        const pipeParts = mainPart.split("|").map(s=>s.trim());
        curExp = {company:pipeParts[0]||"", title:pipeParts[1]||"", location:"", dates:dateMatch?.[0]?.trim()||"", bullets:[]};
      } else if(l.startsWith("•") && curExp){
        curExp.bullets.push(l.replace(/^•\s*/,""));
      } else if(curExp && !l.startsWith("•") && l.match(/(Jan|Feb|Mar|Apr|May|Jun|Jul|Aug|Sep|Oct|Nov|Dec).*\d{4}/i)){
        curExp.dates = l.trim();
      } else if(curExp && !l.startsWith("•")){
        if(!curExp.title) curExp.title = l;
        else if(!curExp.location) curExp.location = l;
      }
    }
    if(curExp) experience.push(curExp);
    // Fallback from recentJobs
    if(!experience.length){
      (fb.recentJobs||[]).forEach(j=>{
        const i=j.lastIndexOf(" at ");
        experience.push(i>0?{company:j.slice(i+4),title:j.slice(0,i),location:"",dates:"",bullets:[]}:{company:j,title:"",location:"",dates:"",bullets:[]});
      });
    }

    // Parse projects
    const projLines = sections["PROJECTS"] || sections["PROJECT"] || [];
    const projects = [];
    let curProj = null;
    for(const l of projLines){
      if(!l.startsWith("•") && l.match(/\d{4}|analysis|dashboard|classifier|detector|model/i)){
        if(curProj) projects.push(curProj);
        const dateMatch = l.match(/(Jan|Feb|Mar|Apr|May|Jun|Jul|Aug|Sep|Oct|Nov|Dec)[^|]*\d{4}[^|]*(?:Present|-[^|]*)?\s*$/i);
        curProj = {name:l.replace(dateMatch?.[0]||"","").trim(), dates:dateMatch?.[0]?.trim()||"", bullets:[]};
      } else if(curProj && l.startsWith("•")){
        curProj.bullets.push(l.replace(/^•\s*/,""));
      }
    }
    if(curProj) projects.push(curProj);

    // Parse additional projects (bullet list of short items)
    const addlLines = sections["ADDITIONAL_PROJECTS"] || sections["ADDITIONAL_PROJECT"] || [];
    const additionalProjects = addlLines
      .filter(l=>l.startsWith("•"))
      .map(l=>{
        const t=l.replace(/^•\s*/,"");
        const colon=t.indexOf(":");
        return colon>0?{name:t.slice(0,colon).trim(),description:t.slice(colon+1).trim()}:{name:t,description:""};
      });

    // Parse skills
    const skillLines = sections["SKILLS"] || sections["SKILL"] || [];
    const skills = skillLines
      .filter(l=>l.startsWith("•"))
      .map(l=>{
        const t=l.replace(/^•\s*/,"");
        const colon=t.indexOf(":");
        return colon>0?{label:t.slice(0,colon).trim(),items:t.slice(colon+1).trim()}:{label:"Skills",items:t};
      });
    if(!skills.length && fb.topSkills?.length){
      skills.push({label:"Skills",items:fb.topSkills.join(", ")});
    }

    // Parse certifications
    const certLines = sections["CERTIFICATIONS"] || sections["CERTIFICATION"] || [];
    const certifications = certLines
      .filter(l=>l.startsWith("•"))
      .map(l=>l.replace(/^•\s*/,""));

    state.finalResumeData = {name, contact, summary, education, experience, projects, additionalProjects, skills, certifications};
    state.finalResumeHTML = null;
    console.log("Fallback parsed from resumeText — sections found:", Object.keys(sections));
    return;
  }

  // Last resort — use parsedResume shallow data
  state.finalResumeData = {
    name:    fb.name||"",
    contact: [fb.phone||"",fb.email||""].filter(Boolean).join(" | "),
    summary: fb.summary||"",
    education: fb.education?[{school:"",degree:String(fb.education),location:"",date:"",gpa:"",details:[]}]:[],
    experience: (fb.recentJobs||[]).map(j=>{
      const i=j.lastIndexOf(" at ");
      return i>0?{company:j.slice(i+4),title:j.slice(0,i),location:"",dates:"",bullets:[]}:{company:j,title:"",location:"",dates:"",bullets:[]};
    }),
    projects:[],additionalProjects:[],
    skills:(fb.topSkills||[]).length?[{label:"Skills",items:fb.topSkills.join(", ")}]:[],
    certifications:[]
  };
  state.finalResumeHTML=null;
}

function runATSCheck(){
  // Instant local ATS scoring — no API call, no spinner
  const job = state.jobs[state.selectedJob];
  if(!job){ state.atsScore=null; return; }

  const d = state.finalResumeData;
  const resumeWords = new Set(
    [d?.summary||"",
     ...(d?.experience||[]).flatMap(e=>[...(e.bullets||[]), e.title||"", e.company||""]),
     ...(d?.skills||[]).map(s=>s.items||""),
     ...(d?.projects||[]).flatMap(p=>p.bullets||[]),
     state.resumeText||""
    ].join(" ").toLowerCase().replace(/[^a-z0-9\s]/g," ").split(/\s+/).filter(w=>w.length>2)
  );

  // Keywords to match — job requirements + title words
  const reqKeywords = [
    ...(job.keyRequirements||[]),
    job.title||"",
    job.description||""
  ].join(" ").toLowerCase().replace(/[^a-z0-9\s]/g," ").split(/\s+/)
   .filter(w=>w.length>3)
   .filter(w=>!["with","that","this","from","have","will","able","your","their","they","been","were","when","where","what","also","into","over","such","more","than","then","these","those","which","would","could","should"].includes(w));

  // Deduplicate and limit
  const uniqueReqs = [...new Set(reqKeywords)].slice(0,30);

  const matched = uniqueReqs.filter(k=>resumeWords.has(k));
  const missing = uniqueReqs.filter(k=>!resumeWords.has(k)).slice(0,6);

  const score = Math.min(98, Math.round(40 + (matched.length/Math.max(uniqueReqs.length,1))*58));

  const verdict = score>=85 ? "Excellent match — strongly tailored for this role"
                : score>=70 ? "Good match — a few keywords to add"
                : score>=55 ? "Moderate match — consider adding missing keywords"
                : "Needs work — resume may not pass ATS screening";

  state.atsScore = {
    score,
    matched: matched.slice(0,8),
    missing: missing.slice(0,6),
    verdict
  };

  renderATSScore();
}

      +row2(`<strong>${e.company||""}</strong>${e.title?`<span style="color:#555;font-weight:normal;"> · ${e.title}</span>`:""}`, e.dates||"")
      +buls(e.bullets,F,"10pt")
      +`</div>`).join("") : "";
    const proj = (d.projects&&d.projects.length) ? sec("Projects")+d.projects.map(pr=>
      `<div style="margin-bottom:4px;">`
      +row2(`<strong>${pr.name||""}</strong>`, pr.dates||"")
      +buls(pr.bullets,F,"10pt")
      +`</div>`).join("") : "";
    const addl = (d.additionalProjects&&d.additionalProjects.length)
      ? `<ul style="margin:1px 0 5px 0;padding-left:17px;list-style-type:disc;">`
        +d.additionalProjects.map(p=>`<li style="font-family:${F};font-size:10pt;line-height:1.4;margin-bottom:0;"><strong>${p.name||""}:</strong> ${p.description||""}</li>`).join("")

    const skills = (d.skills&&d.skills.length) ? sec("Skills")
      +d.skills.map(s=>`<div style="display:flex;font-family:${F};font-size:10pt;line-height:1.45;margin-bottom:2px;"><strong style="white-space:nowrap;margin-right:5px;color:#555;">${s.label||""}:</strong><span style="color:#222;">${s.items||""}</span></div>`).join("") : "";

  state.selectedTemplate="classic";

function buildMockResume(p,job,approved){
  // If we have the real resume text, use it as the base and append the tailoring note
  if(state.resumeText && state.resumeText.length > 100){
    let base = state.resumeText;
    // Apply any approved suggestion text substitutions manually
    approved.forEach(s=>{
      if(s.oldText && s.newText && base.includes(s.oldText)){
        base=base.replace(s.oldText, s.newText);
      }
    });
    return base + `\n\n---\nTailored for: ${job.title} at ${job.company}`;
  }
  // True fallback using parsed fields
  return `${p.name||"Your Name"}
${[p.email,p.phone].filter(Boolean).join(" | ")||""}

PROFESSIONAL SUMMARY
${p.summary||"Experienced professional seeking new opportunities."}

CORE SKILLS
${(p.topSkills||[]).join(" · ")||""}

WORK EXPERIENCE
${(p.recentJobs||[]).join("\n")||""}

EDUCATION
${p.education||""}

---
Tailored for: ${job.title} at ${job.company}`;
}

function selectTemplate(id){
  state.selectedTemplate = id;
  document.querySelectorAll(".tpl-card").forEach(el=>{
    el.classList.toggle("selected", el.id===`tpl-${id}`);
  });
}

function switchTemplate(id){
  state.selectedTemplate = id;
  // Re-render the preview
  const prev = document.getElementById("resumePreview");
  if(prev) prev.innerHTML = renderResumeHTML(id);
  // Update button styles using data-tpl attribute (avoids HTML-encoded onclick selector issues)
  document.querySelectorAll("[data-tpl]").forEach(btn=>{
    const active = btn.dataset.tpl === id;
    btn.style.borderColor = active ? "var(--gold)" : "var(--border)";
    btn.style.background  = active ? "rgba(201,168,76,0.12)" : "var(--surface2)";
    btn.style.color       = active ? "var(--gold)" : "var(--text-muted)";
  });
}

          onmouseover="this.style.borderColor='${b.color}';this.style.color='${b.color}';this.style.background='rgba(201,168,76,0.1)'"
          onmouseout="this.style.borderColor='rgba(201,168,76,0.2)';this.style.color='var(--text-muted)';this.style.background='rgba(201,168,76,0.06)'">
          <span style="width:8px;height:8px;border-radius:50%;background:${b.color};display:inline-block;flex-shrink:0"></span>${b.name}

      </a>`
    ).join("");
  }, 50);

  // Wire up tone chips after render
  document.querySelectorAll("#toneGroup .chip").forEach(chip=>{
    chip.addEventListener("click",()=>{
      document.querySelectorAll("#toneGroup .chip").forEach(c2=>c2.classList.remove("selected"));
      chip.classList.add("selected");
      state.coverLetterTone=chip.querySelector("input").value;
    });
  });
}

async function generateCoverLetter(){
  const job = state.jobs[state.selectedJob];
  const p   = state.parsedResume||{};
  const name = document.getElementById("clName")?.value || p.name || "";
  const hm   = document.getElementById("clHiringManager")?.value || "";
  const extra= document.getElementById("clExtra")?.value || "";
  const tone = state.coverLetterTone || "professional";

  // Show loading inside the card
  const card = document.getElementById("coverLetterCard");
  if(card){
    card.innerHTML = `<div class="card-title"><i class="ti ti-file-description" style="color:var(--gold);margin-right:8px"></i>Cover Letter</div>
      <div style="display:flex;align-items:center;gap:12px;padding:1.5rem 0;color:var(--text-muted)">
        <div class="spinner"></div> Writing your cover letter...
      </div>`;
  }

  const prompt = `Write a ${tone} cover letter for ${name||"the candidate"} applying for ${job.title} at ${job.company}.
${hm ? `Address it to ${hm}.` : "Address it to the Hiring Manager."}
Key job requirements: ${(job.keyRequirements||[]).join(", ")}.
Candidate background: ${p.summary||""}
Top skills: ${(p.topSkills||[]).join(", ")||""}
Recent experience: ${(p.recentJobs||[]).join(", ")||""}
${extra ? `Also mention: ${extra}` : ""}
Write 3 focused paragraphs. Use a ${tone} tone. No placeholder brackets — write it as a finished, ready-to-send letter. End with a professional sign-off using the candidate's name.`;

  try{
    const resp = await fetch(API_URL,{method:"POST",headers:{"Content-Type":"application/json","anthropic-dangerous-direct-browser-access":"true"},
      body:JSON.stringify({model:MODEL,max_tokens:1000,messages:[{role:"user",content:prompt}]})
    });
    const data = await resp.json();
    state.finalCoverLetter = data.content.map(i=>i.text||"").join("").trim();
  } catch(e){
    state.finalCoverLetter = `Dear ${hm||"Hiring Manager"},\n\nI am excited to apply for the ${job.title} position at ${job.company}. With ${p.yearsExperience||"several"} years of experience in ${(p.topSkills||[])[0]||"this field"}, I am confident I can contribute meaningfully to your team.\n\nThroughout my career, I have developed strong expertise in ${(job.keyRequirements||[]).slice(0,2).join(" and ")}. I am drawn to ${job.company} because of its reputation and the opportunity this role represents.\n\nI would welcome the chance to discuss how my background aligns with your needs. Thank you for your consideration.\n\nSincerely,\n${name||"Your Name"}`;
  }
  // Re-render the full apply view so the cover letter section shows with download button
  renderApply(document.getElementById("mainContent"));
}

function serializeResume(){
  const d=state.finalResumeData;
  if(!d) return state.finalResume||"";
  const lines=[];
  if(d.name) lines.push(d.name);
  if(d.contact) lines.push(d.contact);
  lines.push("");
  if(d.summary){lines.push("PROFESSIONAL SUMMARY");lines.push(d.summary);lines.push("");}
  if(d.skills&&Object.keys(d.skills).length){
    lines.push("SKILLS");
    Object.entries(d.skills).forEach(([k,v])=>lines.push(`${k}: ${v}`));
    lines.push("");
  }
  if(d.experience&&d.experience.length){
    lines.push("WORK EXPERIENCE");
    d.experience.forEach(e=>{
      lines.push(`${e.title} · ${e.company}`);
      if(e.location||e.dates) lines.push(`${e.location||""}${e.dates?" | "+e.dates:""}`);
      (e.bullets||[]).forEach(b=>lines.push(`  • ${b}`));
      lines.push("");
    });
  }
  if(d.projects&&d.projects.length){
    lines.push("PROJECTS");
    d.projects.forEach(pr=>{
      lines.push(`${pr.name}${pr.dates?" | "+pr.dates:""}`);
      (pr.bullets||[]).forEach(b=>lines.push(`  • ${b}`));
      lines.push("");
    });
  }
  if(d.education&&d.education.length){
    lines.push("EDUCATION");
    d.education.forEach(e=>{
      lines.push(`${e.degree} · ${e.school}`);
      if(e.location||e.date) lines.push(`${e.location||""}${e.date?" | "+e.date:""}`);
      (e.details||[]).forEach(b=>lines.push(`  ${b}`));
      lines.push("");
    });
  }
  if(d.certifications&&d.certifications.length){
    lines.push("CERTIFICATIONS");
    d.certifications.forEach(c=>lines.push(`  • ${c}`));
  }
  return lines.join("\n");
}

function copyResume(){
  // Get plain text from the rendered preview
  const preview = document.getElementById("resumePreview");
  const text = preview ? preview.innerText : serializeResume();
  navigator.clipboard.writeText(text).then(()=>{
    const btn=[...document.querySelectorAll(".btn")].find(b=>b.textContent.includes("Copy"));
    if(btn){btn.innerHTML='<i class="ti ti-check" aria-hidden="true"></i> Copied!';setTimeout(()=>{btn.innerHTML='<i class="ti ti-copy" aria-hidden="true"></i> Copy Resume';},2000);}
  });
}
